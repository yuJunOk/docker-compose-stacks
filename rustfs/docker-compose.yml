services:
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "${RUSTFS_BIND:-127.0.0.1}:${RUSTFS_PORT_9000:-9000}:9000"
      - "${RUSTFS_BIND:-127.0.0.1}:${RUSTFS_PORT_9001:-9001}:9001"
    volumes:
      - ${RUSTFS_DATA_DIR:-./rustfs_data}:/data
    restart: unless-stopped
